services:
  db:
    image: mysql:8.0
    container_name: giftogram_mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init/001-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  api:
    build:
      context: .
      dockerfile: dockerfile
      target: backend
    container_name: giftogram_api
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: dockerfile
      target: frontend
    container_name: giftogram_frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
